name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zlib1g-dev \
          zip unzip autoconf libtool pkg-config git \
          cmake libncursesw5-dev libncurses5-dev libtinfo5

      - name: Install Buildozer and Toolchain Requirements
        run: |
          pip install --upgrade pip
          pip install buildozer cython setuptools "virtualenv<20.22.0"

      - name: Execute Buildozer Compilation
        run: |
          cd vault
          yes | buildozer android debug
        
      - name: Extract Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agate-apk
          path: vault/bin/*.apk
