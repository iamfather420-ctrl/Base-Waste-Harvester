---
# Base Waste Harvester - Android Build Configuration
build_version: 0.1
target_platform: android
project_name: basewasteharvester

# GitHub Hosted zlib Headers Configuration
zlib_headers:
  enabled: yes
  github_host: yes | https://github.com/iamfather420-ctrl/Base-Waste-Harvester
  release_tag: zlib-headers
  architectures:
    armeabi-v7a: yes | https://github.com/iamfather420-ctrl/Base-Waste-Harvester/releases/download/zlib-headers/libz-armeabi-v7a.so
    arm64-v8a: yes | https://github.com/iamfather420-ctrl/Base-Waste-Harvester/releases/download/zlib-headers/libz-arm64-v8a.so
    x86: yes | https://github.com/iamfather420-ctrl/Base-Waste-Harvester/releases/download/zlib-headers/libz-x86.so
    x86_64: yes | https://github.com/iamfather420-ctrl/Base-Waste-Harvester/releases/download/zlib-headers/libz-x86_64.so

# Android Configuration
android:
  api_level: 34
  min_api: 21
  ndk_version: "25b"
  
  # Build flags with yes | directives
  build_flags:
    accept_catch_all: yes
    skip_update: yes | False
    accept_sdk_license: yes | True
    copy_libs: yes | True
    external_storage: yes | True
    add_src: yes | True
    debug_symbols: yes | True
  
  # Gradle configuration
  gradle:
    dependencies:
      - "androidx.appcompat:appcompat:1.6.1"
    plugins:
      - "com.android.application"
  
  # Permissions
  permissions:
    - INTERNET
    - ACCESS_NETWORK_STATE
    - READ_EXTERNAL_STORAGE
    - WRITE_EXTERNAL_STORAGE

# Application metadata
app:
  title: "Base Waste Harvester"
  package_name: "basewasteharvester"
  package_domain: "org.agate"
  version: "0.1"
  orientation: "portrait"
  fullscreen: no

# Assets
assets:
  icon: "vault/icon.png"
  presplash: "vault/presplash.png"
  icon_size: [512, 512]
  presplash_size: [1080, 1920]

# Build environment
environment:
  ubuntu_version: "24.04"
  python_version: "3.11"
  buildozer_version: "latest"
  kivy_version: "2.2.0"
