name: Project AGATE Remote Compilation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildozer-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Base Waste Harvester
        uses: actions/checkout@v4

      - name: Initialize Ubuntu Architecture & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zlib1g-dev openjdk-17-jdk

      - name: Provision Python Build Environments
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer Framework
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Execute Build Compilation (License Auto-Accept)
        run: |
          cd vault
          yes | buildozer -v android debug

      - name: Secure Final APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AGATE_Base_Waste_Harvester_Release
          path: vault/bin/*.apk
