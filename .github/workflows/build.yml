name: Build Android Package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool openjdk-17-jdk unzip zip

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer

    - name: Build with Buildozer
      run: |
        # Explicitly enforce static metrics into the target vault spec before compilation
        sed -i 's/^#\? \?android.api =.*/android.api = 34/' vault/buildozer.spec
        sed -i 's/^#\? \?android.minapi =.*/android.minapi = 21/' vault/buildozer.spec
        sed -i 's/^#\? \?android.ndk =.*/android.ndk = 25b/' vault/buildozer.spec
        sed -i 's/^#\? \?android.archs =.*/android.archs = arm64-v8a, armeabi-v7a/' vault/buildozer.spec
        
        # Verify that package identity attributes are explicitly defined to prevent Abandon errors
        grep -E "^(title|package.name|version) =" vault/buildozer.spec || echo "[!] Check identity fields"
        
        # Shift execution context directly into the folder housing your code and spec file
        cd vault/
        yes | buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: vault/bin/*.apk

