name: Android APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool libtoolize openjdk-17-jdk unzip zip

    - name: Install Python Dependencies
      run: |
        pip install buildozer cython
        pip install Pillow

    - name: Generate Assets
      run: python generate_assets.py

    - name: Build with Buildozer
      run: |
        # If your buildozer.spec is in the vault directory, enter it, otherwise stay in root
        if [ -d "vault" ]; then cd vault; fi
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: base-waste-harvester-apk
        path: vault/bin/*.apk
