name: Build Android Package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool libtoolize openjdk-17-jdk unzip zip
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer

    - name: Build with Buildozer
      run: |
        # Strip out host NDK pathing that conflicts with version 25b
        unset ANDROID_NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_LATEST_HOME
        
        # Navigate to vault and execute build
        cd vault/
        yes | buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: vault/bin/*.apk

