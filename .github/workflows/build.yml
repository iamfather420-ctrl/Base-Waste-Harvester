name: Build Android Package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool openjdk-17-jdk unzip zip

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer

    - name: Build with Buildozer
      run: |
        # Clear local workspace cache anomalies
        rm -rf ~/.buildozer/android/platform/

        # Clean project target variables directly in the spec
        sed -i 's/^#\? \?android.api =.*/android.api = 34/' vault/buildozer.spec
        sed -i 's/^#\? \?android.minapi =.*/android.minapi = 21/' vault/buildozer.spec
        sed -i 's/^#\? \?android.ndk =.*/android.ndk = 25b/' vault/buildozer.spec
        sed -i 's/^#\? \?android.archs =.*/android.archs = arm64-v8a, armeabi-v7a/' vault/buildozer.spec
        
        # Strip out Github's global environment overrides for the NDK
        unset ANDROID_NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_LATEST_HOME

        # Jump context into the target directory and execute
        cd vault/
        yes | buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: vault/bin/*.apk

